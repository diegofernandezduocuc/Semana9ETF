spring.application.name=minimarket

spring.datasource.url=jdbc:h2:mem:minimarketdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.h2.console.enabled=false
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.open-in-view=false

springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operations-sorter=method
springdoc.swagger-ui.tags-sorter=alpha
springdoc.api-docs.path=/v3/api-docs

# Configuración local de JWT. Si JWT_SECRET no se define, se genera una clave efímera al iniciar.
app.jwt.secret=${JWT_SECRET:}
app.jwt.expiration-seconds=3600
app.jwt.issuer=minimarket-plus
